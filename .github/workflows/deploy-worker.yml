name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm i -g wrangler@latest

      - name: Ensure KV namespace exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          KV_TITLE: SUBSCRIPTIONS_KV
        run: |
          set -e
          if [ ! -f wrangler.toml ]; then
            echo "wrangler.toml not found"
            exit 1
          fi

          CURRENT_KV_ID=$(awk '/\[\[kv_namespaces\]\]/{flag=1;next} flag && /^id\s*=/{gsub(/"/,"",$3); print $3; exit}' wrangler.toml)

          if [ -n "$CURRENT_KV_ID" ] && [ "$CURRENT_KV_ID" != "your-kv-namespace-id" ]; then
            echo "KV id already configured: $CURRENT_KV_ID"
            exit 0
          fi

          echo "KV id missing or placeholder, creating namespace..."
          CREATE_OUTPUT=$(wrangler kv namespace create "$KV_TITLE" --format json)
          NEW_ID=$(echo "$CREATE_OUTPUT" | node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync(0,'utf8'));console.log((d&&d.id)||'')")

          if [ -z "$NEW_ID" ]; then
            echo "Failed to create KV namespace"
            echo "$CREATE_OUTPUT"
            exit 1
          fi

          echo "Created KV namespace id: $NEW_ID"

          if grep -q '^id\s*=\s*"' wrangler.toml; then
            sed -i -E "0,/^id\s*=\s*\".*\"/s//id = \"$NEW_ID\"/" wrangler.toml
          else
            sed -i -E "/\[\[kv_namespaces\]\]/a id = \"$NEW_ID\"" wrangler.toml
          fi

          if grep -q '^preview_id\s*=\s*"' wrangler.toml; then
            sed -i -E "0,/^preview_id\s*=\s*\".*\"/s//preview_id = \"$NEW_ID\"/" wrangler.toml
          fi

          echo "wrangler.toml updated with KV id"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --env production
