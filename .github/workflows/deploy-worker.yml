name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm i -g wrangler@latest

      - name: Ensure KV namespace exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          set -e
          if [ ! -f wrangler.toml ]; then
            echo "wrangler.toml not found"
            exit 1
          fi

          TARGET_KV_ID="${CF_KV_NAMESPACE_ID:-}"

          if [ -z "$TARGET_KV_ID" ]; then
            KV_TITLE="SUBSCRIPTIONS_KV"
            echo "CF_KV_NAMESPACE_ID not provided, creating KV namespace: $KV_TITLE"
            CREATE_OUTPUT=$(wrangler kv namespace create "$KV_TITLE" --format json)
            TARGET_KV_ID=$(echo "$CREATE_OUTPUT" | node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync(0,'utf8'));console.log((d&&d.id)||'')")

            if [ -z "$TARGET_KV_ID" ]; then
              echo "Failed to create KV namespace"
              echo "$CREATE_OUTPUT"
              exit 1
            fi

            echo "Created KV namespace id: $TARGET_KV_ID"
            echo "建议将该 ID 保存为 GitHub Secret: CF_KV_NAMESPACE_ID"
          else
            echo "Using provided CF_KV_NAMESPACE_ID: $TARGET_KV_ID"
          fi

          if grep -q '^\[\[env.production.kv_namespaces\]\]' wrangler.toml; then
            sed -i -E '/^\[\[env.production.kv_namespaces\]\]/,/^\[/{s/^id\s*=\s*".*"/id = "'"$TARGET_KV_ID"'"/}' wrangler.toml
            sed -i -E '/^\[\[env.production.kv_namespaces\]\]/,/^\[/{s/^preview_id\s*=\s*".*"/preview_id = "'"$TARGET_KV_ID"'"/}' wrangler.toml
          else
            printf '\n[[env.production.kv_namespaces]]\nbinding = "SUBSCRIPTIONS_KV"\nid = "%s"\npreview_id = "%s"\n' "$TARGET_KV_ID" "$TARGET_KV_ID" >> wrangler.toml
          fi

          echo "wrangler.toml updated with production KV id: $TARGET_KV_ID"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --env production
